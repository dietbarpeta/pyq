<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Beneficiaries</title>

<style>

body {
  margin: 0;
  font-family: Poppins;
  background: #f4f6f9;
}

/* Header */
.header {
  height: 60px;
  background: #d2554f;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 600;
}

/* Grid */
.container {
  padding: 15px;
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 15px;
}

/* Card */
.card {
  background: #fff;
  border-radius: 18px;
  aspect-ratio: 1/1;
  padding: 15px;
  position: relative;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(210,85,79,0.25);
}

/* Title */
.card h3 {
  font-size: 15px;
  margin: 0;
  color: #333;
  line-height: 1.3;
  max-width: 70%;
}

/* FIXED COUNT */
.count {
  position: absolute;
  left: 15px;
  bottom: 15px;
  background: #d2554f;
  color: #fff;
  padding: 6px 16px;
  border-radius: 20px;
  font-weight: bold;
  box-shadow: 0 4px 10px rgba(210,85,79,0.3);
}

/* Image */
.card img {
  position: absolute;
  right: 10px;
  bottom: 10px;
  width: 80px;
}

/* Shape */
.card::after {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(210,85,79,0.08);
  border-radius: 50%;
  bottom: 0;
  right: 0;
}

</style>
</head>

<body>

<div class="header">Beneficiaries</div>

<div class="container" id="container"></div>

<script>

function go(cat){
  location.href = "list.html?category=" + cat;
}

fetch("data.json")
.then(res => res.json())
.then(data => {

  let html = "";

  data.categories.forEach(cat => {

    let count = data.profiles.filter(p => p.category === cat.id).length;

    html += `
    <div class="card" onclick="go('${cat.id}')">
      <h3>${cat.title}</h3>
      <div class="count">${count}</div>
      <img src="${cat.image}">
    </div>
    `;
  });

  container.innerHTML = html;

});

</script>

</body>
</html>
